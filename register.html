<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Register</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #060606;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* NAVBAR placeholder */
#navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
}

/* Card */
.card {
  background: #111;
  padding: 40px;
  border-radius: 15px;
  width: 380px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
  margin-top: 120px; /* navbarin tilaa */
}

h2 {
  margin-top: 0;
  font-size: 26px;
  text-align: center;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #ff0055, #7000ff);
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.85;
}

p {
  text-align: center;
  margin-top: 15px;
  opacity: 0.8;
}

a {
  color: #9b5cff;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="card">
  <h2>Create an account</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="registerUser()">Join</button>

  <p id="message"></p>

  <p>Already have an account? <a href="member.html">Login</a></p>
</div>

<!-- Load navbar -->
<script>
fetch("navbar.html")
  .then(r => r.text())
  .then(html => document.getElementById("navbar").innerHTML = html);
</script>

<script type="module">
import { supabase } from "./js/supabase.js";

window.registerUser = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    document.getElementById("message").innerText = error.message;
  } else {
    document.getElementById("message").innerText = "Account created! Redirecting...";
    setTimeout(() => window.location.href = "login.html", 1500);
  }
};
</script>

</body>
</html>
