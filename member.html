<!DOCTYPE html>
<html>
<head>
<title>Member</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

main{
flex:1;
padding-top:120px;
}

section{
padding:40px 8%;
text-align:center;
}

.box{
max-width:400px;
margin:auto;
background:#111;
padding:40px;
border-radius:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

button{
padding:15px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff0055,#7000ff);
color:white;
cursor:pointer;
margin-top:15px;
}

#member-content{
display:none;
}

</style>

</head>

<body>

<div id="navbar"></div>

<main>
<section>

<div class="box" id="login-box">

<h2>Member Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick=""window.location.href='dashboard.html'"">   <!-- MUISTA MUUTTAA TAKAISIN <button oneclick="loginUser()"> -->
Login                              
</button>                         

</div>

<div id="member-content">

<h2>Welcome Member</h2>

<p id="user-email"></p>

<button onclick="logoutUser()">
Logout
</button>

</div>

</section>
</main>

<div id="footer"></div>

<!-- PIILOTETTU JS LOGIIKKA -->
<script type="module" src="js/auth.js"></script>

</body>
</html>
