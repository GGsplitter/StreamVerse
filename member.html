<!DOCTYPE html>
<html>
<head>
<title>Member</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
gap:30px;
align-items:center;
background:rgba(0,0,0,.7);
backdrop-filter:blur(20px);
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
white-space:nowrap;
}

.menu-icon{
display:none;
margin-left:auto;
font-size:24px;
cursor:pointer;
}

/* SECTION */

section{
padding:140px 8%;
text-align:center;
}

.member-box{
max-width:400px;
margin:auto;
background:#111;
padding:40px;
border-radius:20px;
}

.member-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

.btn{
padding:18px;
width:100%;
background:linear-gradient(45deg,#ff0055,#7000ff);
border:none;
border-radius:14px;
color:white;
}

/* FOOTER */

footer{
padding:80px;
background:#0a0a0a;
margin-top:120px;
text-align:center;
}

/* MOBILE ONLY */

@media(max-width:768px){

nav{
flex-wrap:wrap;
gap:15px;
}

nav a{
display:none;
width:100%;
padding:10px 0;
}

nav.active a{
display:block;
}

.menu-icon{
display:block;
}

section{
padding-top:160px;
}

}

</style>
</head>

<body>

<nav id="navbar">

<a href="index.html">Home</a>
<a href="news.html">News</a>
<a href="streamers.html">Creators</a>
<a href="creatorofthemonth.html">Creator of the Month</a>
<a href="about.html">About Us</a>
<a href="member.html">Member</a>

<div class="menu-icon" onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</div>

</nav>

<div class="member-box">

<input placeholder="Username">
<input type="password" placeholder="Password">

<button class="btn">Login</button>

</div>

</section>

<footer>

">

</p>

<div style="
margin-top:25px;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
">

<i class="fab fa-instagram" style="color:white;font-size:28px;"></i>
</a>

document.getElementById("navbar").classList.toggle("active");

</body>
