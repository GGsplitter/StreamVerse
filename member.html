<!DOCTYPE html>
<html>
<head>
<title>Member</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
}

/* ⭐ MAIN WRAPPER */
main{
padding-top:120px;
}

/* SECTION */

section{
padding:40px 8%;
text-align:center;
}

.member-box{
max-width:400px;
margin:auto;
background:#111;
padding:40px;
border-radius:20px;
}

.member-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

.btn{
padding:18px;
width:100%;
background:linear-gradient(45deg,#ff0055,#7000ff);
border:none;
border-radius:14px;
color:white;
cursor:pointer;
}

/* FOOTER */
footer{
padding:80px;
background:#0a0a0a;
margin-top:120px;
text-align:center;
}

/* MOBILE */

@media(max-width:768px){
section{
padding-top:160px;
}
}

</style>
</head>

<body>

<!-- ⭐ NAVBAR -->
<div id="navbar"></div>

<main>

<section>

<h2>Member Login COMING SOON</h2>

<div class="member-box">

<input placeholder="Username">
<input type="password" placeholder="Password">

<button class="btn">Login</button>

</div>

</section>

</main>

<!-- ⭐ FOOTER -->
<div id="footer"></div>

<script>

/* Load Navbar */
fetch("navbar.html")
.then(r => r.text())
.then(data => {
document.getElementById("navbar").innerHTML = data;
});

/* Load Footer */
fetch("footer.html")
.then(r => r.text())
.then(data => {
document.getElementById("footer").innerHTML = data;
});

</script>

</body>
</html>
