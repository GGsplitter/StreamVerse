<!DOCTYPE html>
<html>
<head>
<title>Member</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

main{
flex:1;
padding-top:120px;
}

section{
padding:40px 8%;
text-align:center;
}

.box{
max-width:400px;
margin:auto;
background:#111;
padding:40px;
border-radius:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

button{
padding:15px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff0055,#7000ff);
color:white;
cursor:pointer;
margin-top:15px;
}

#member-content{
display:none;
}

</style>

</head>

<body>

<div id="navbar"></div>

<main>
<section>

<div class="box" id="login-box">

<h2>Member Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<div id="member-content">

<h2>Welcome Member</h2>

<p id="user-email"></p>

<button onclick="logout()">
Logout
</button>

</div>

</section>
</main>

<div id="footer"></div>

<script>

/* =============================
SUPABASE AUTH (PIILOSSA)
============================= */

const supabase = supabase.createClient(
"PASTE_SUPABASE_URL",
"PASTE_SUPABASE_ANON_KEY"
)

/* LOGIN */

async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { error } = await supabase.auth.signInWithPassword({
email,password
})

if(error){
alert(error.message)
return
}

location.reload()

}

/* SESSION CHECK */

window.onload = async () => {

const { data } = await supabase.auth.getUser()

if(data.user){

document.getElementById("login-box").style.display="none"
document.getElementById("member-content").style.display="block"

document.getElementById("user-email").innerText =
data.user.email

}

}

/* LOGOUT */

async function logout(){
await supabase.auth.signOut()
location.reload()
}

/* NAV + FOOTER LOAD */

fetch("navbar.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("navbar").innerHTML=data
})

fetch("footer.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("footer").innerHTML=data
})

</script>

</body>
</html>
