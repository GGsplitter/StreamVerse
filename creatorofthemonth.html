<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
gap:30px;
backdrop-filter:blur(20px);
background:rgba(0,0,0,0.7);
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* CONTENT */

section{
padding:140px 8%;
text-align:center;
}

/* GRADIENT TITLE */

.gradient-text{
font-size:48px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
}

/* CREATOR CARD */

.creator-card{
max-width:450px;
margin:auto;
background:#111;
padding:40px;
border-radius:25px;
transition:.3s;
}

.creator-card:hover{
transform:translateY(-10px);
}

/* ⭐ LOGO STYLE */

.cotm-logo{
max-width:220px;
width:100%;
display:block;
margin:0 auto 20px auto;
border-radius:20px;
object-fit:contain;
filter:drop-shadow(0 0 15px #7000ff);
transition:.3s;
}

.cotm-logo:hover{
transform:scale(1.05);
}

/* FOOTER */

footer{
padding:70px;
background:#0a0a0a;
text-align:center;
margin-top:auto;
}

footer a{
color:white;
text-decoration:none;
font-size:16px;

}
