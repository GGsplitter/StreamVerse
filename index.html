<!DOCTYPE html>
<html lang="fi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Creators Hype Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.85);
padding:15px 8%;
display:flex;
align-items:center;
gap:25px;
z-index:9999;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* HAMBURGER */

.hamburger{
margin-left:auto;
display:none;
flex-direction:column;
cursor:pointer;
gap:5px;
}

.hamburger span{
width:28px;
height:3px;
background:white;
}

/* MOBILE MENU */

@media(max-width:768px){

nav{
flex-wrap:wrap;
}

nav a{
display:none;
width:100%;
padding:10px 0;
}

nav.show a{
display:block;
}

.hamburger{
display:flex;
}

}

/* HERO */

.hero{
padding-top:140px;
text-align:center;
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;
}

.hero h1{
font-size:50px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
}

.btn{
padding:15px 35px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff0055,#7000ff);
color:white;
font-size:18px;
}

/* FOOTER */

footer{
margin-top:auto;
padding:60px;
background:#0a0a0a;
text-align:center;
}

</style>

</head>

<body>

<nav id="nav">

<a href="#">Home</a>
<a href="#">News</a>
<a href="#">Creators</a>
<a href="#">About</a>
<a href="#">Member</a>

<div class="hamburger" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>

</nav>

<section class="hero">

<h1>CREATORS HYPE HUB</h1>
<p>Connect creators. Grow together.</p>

<br>
<button class="btn">Join Hype Hub</button>

</section>

<footer>
<h2>Contact & Socials</h2>
<p>your@email.com</p>
</footer>

<script>

function toggleMenu(){
document.getElementById("nav").classList.toggle("show");
}

</script>

</body>
</html>
