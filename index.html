<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators Hype Hub</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
min-height:100vh;
}

/* MAIN WRAPPER */

main{
padding-top:100px;
}

/*  HERO */

.hero{
height:60vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("HERO_IMAGE.png");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

position:relative;
text-align:center;
}

/*  LOGO LEFT CENTER */

.hero-logo{
position:absolute;
left:3%;
top:25%;
transform:translateY(-50%);
z-index:2;
}

.hero-logo img{
height:300px;
width:auto;
filter:drop-shadow(0 0 30px rgba(255,0,150,.7));
opacity:0.85;
transition:.3s;
}

.hero-logo img:hover{
transform:scale(1.05);
}

/*  HERO CONTENT CENTER */

.hero-content{
display:flex;
flex-direction:column;
align-items:center;
}

/*  TITLE STACK */

.hero-title{
display:flex;
flex-direction:column;
align-items:flex-start;
}

.hero-title span:first-child{
font-size:70px;
font-weight:900;
letter-spacing:2px;

background:linear-gradient(45deg,#ff4da6,#5b4dff);
-webkit-background-clip:text;
color:transparent;
}

.hero-title span:last-child{
font-size:55px;
font-weight:800;
letter-spacing:4px;

background:linear-gradient(45deg,#00c3ff,#7000ff);
-webkit-background-clip:text;
color:transparent;

margin-top:-15px;
}

/*  DESCRIPTION */

.hero p{
font-size:22px;
opacity:.9;
margin:25px 0;
max-width:600px;
text-align:center;
}

/*  BUTTON CENTER */

.btn{
padding:15px 40px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ff0055,#7000ff);
color:white;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

/*  SLIDER */

.sponsor{
background:#111;
padding:30px 0;
overflow:hidden;
}

.sponsor-track{
display:flex;
animation:loopTape 36s linear infinite;
}

.sponsor-track span{
padding:0 70px;
white-space:nowrap;
font-weight:bold;
}

@keyframes loopTape{
from{transform:translateX(0);}
to{transform:translateX(-33.333%);}
}

/* FOOTER */

footer{
padding:70px;
background:#0a0a0a;
text-align:center;
margin-top:auto;
}

footer a{
color:white;
font-size:28px;
text-decoration:none;
}

/* MOBILE */

@media(max-width:900px){

.hero-logo img{
height:120px;
}

.hero-title span:first-child{
font-size:45px;
}

.hero-title span:last-child{
font-size:35px;
}

.hero p{
font-size:16px;
}

}

</style>
</head>

<body>

<div id="navbar"></div>

<main>

<section class="hero">

<div class="hero-logo">
<img src="CHH_LOGO.png">
</div>

<div class="hero-content">

<div class="hero-title">
<span>CREATORS</span>
<span>HYPE HUB</span>
</div>

<p>
Connect creators. Grow together. Get opportunities.
</p>

<button class="btn">Join Hype Hub</button>

</div>

</section>

<div class="sponsor">
<div class="sponsor-track">

<span>👑 Creator Of The Month</span>
<span>🔴 Live Content</span>
<span>🔝 Grow your community</span>
<span>🔗 Collabs</span>
<span>🌏 Visibility</span>

<span>👑 Creator Of The Month</span>
<span>🔴 Live Content</span>
<span>🔝 Grow your community</span>
<span>🔗 Collabs</span>
<span>🌏 Visibility</span>

</div>
</div>

</main>

<div id="footer"></div>

<script>

/* Navbar */
fetch("navbar.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("navbar").innerHTML=d;
});

/* Footer */
fetch("footer.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("footer").innerHTML=d;
});

</script>

</body>
</html>
