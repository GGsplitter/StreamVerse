<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators Hype Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BASIC */

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
gap:30px;
align-items:center;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(20px);
z-index:999;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* HAMBURGER */

.hamburger{
display:none;
margin-left:auto;
font-size:28px;
cursor:pointer;
}

/* NAV MOBILE */

@media(max-width:768px){

nav{
flex-wrap:wrap;
}

nav a{
display:none;
width:100%;
padding:12px 0;
}

nav.open a{
display:block;
}

.hamburger{
display:block;
}

}

/* HERO */

.hero{
margin-top:120px;
height:60vh;
padding:40px 8%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;
}

.hero h1{
font-size:60px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
}

.btn{
padding:15px 40px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ff0055,#7000ff);
color:white;
font-size:18px;
cursor:pointer;
}

/* LOGO */

.logo-box{
position:fixed;
top:85px;
left:8%;
z-index:900;
}

.logo-box img{
height:300px;
filter:drop-shadow(0 0 20px rgba(255,0,150,.6));
}

/* FOOTER */

footer{
padding:70px;
background:#0a0a0a;
text-align:center;
margin-top:80px;
}

</style>

</head>

<body>

<nav id="nav">

<a href="index.html">Home</a>
<a href="news.html">News</a>
<a href="streamers.html">Creators</a>
<a href="creatorofthemonth.html">Creator of the Month</a>
<a href="about.html">About Us</a>
<a href="member.html">Member</a>

<div class="hamburger" onclick="toggleMenu()">
☰
</div>

</nav>

<div class="logo-box">
<img src="CHH_LOGO.png">
</div>

<section class="hero">

<h1>CREATORS HYPE HUB</h1>
<p>Connect creators. Grow together. Get opportunities.</p>

<br>
<button class="btn">Join Hype Hub</button>

</section>

<footer>
<h2>Contact & Socials</h2>
<p>your@email.com</p>
</footer>

<script>
function toggleMenu(){
document.getElementById("nav").classList.toggle("open");
}
</script>

</body>
</html>
