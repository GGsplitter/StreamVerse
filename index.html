<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators Hype Hub</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
padding:18px 8%;
gap:30px;
z-index:1000;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
white-space:nowrap;
}

/* HERO */

.hero{
height:60vh;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
}

.btn{
padding:15px 40px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ff0055,#7000ff);
color:white;
font-size:18px;
cursor:pointer;
}

/* FOOTER */

footer{
padding:60px 20px;
text-align:center;
background:#0a0a0a;
margin-top:40px;
}

/* ========================= */
/* RESPONSIVE SCALING ONLY   */
/* ========================= */

@media (max-width:1200px){

nav{
padding:15px 5%;
gap:20px;
}

.hero h1{
font-size:50px;
}

}

@media (max-width:900px){

nav{
padding:15px 5%;
gap:15px;
font-size:14px;
}

.hero{
height:55vh;
}

.hero h1{
font-size:40px;
}

.btn{
padding:12px 30px;
font-size:16px;
}

}

@media (max-width:600px){

nav{
justify-content:center;
text-align:center;
}

nav a{
font-size:13px;
}

.hero h1{
font-size:32px;
}

.hero p{
font-size:14px;
}

.btn{
width:80%;
}

}

</style>

</head>

<body>

<!-- NAV -->
<nav>

<a href="#">Home</a>
<a href="#">News</a>
<a href="#">Creators</a>
<a href="#">Creator of the Month</a>
<a href="#">About Us</a>
<a href="#">Member</a>

</nav>

<!-- HERO -->
<section class="hero">
<h1>CREATORS HYPE HUB</h1>
<p>Connect creators. Grow together. Get opportunities.</p>
<br>
<button class="btn">Join Hype Hub</button>
</section>

<footer>
<h2>Contact & Socials</h2>
<p>your@email.com</p>
</footer>

</body>
</html>
