<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators Hype Hub</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
padding:18px 8%;
gap:30px;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* HAMBURGER */

.menu-toggle{
display:none;
font-size:28px;
margin-left:auto;
cursor:pointer;
}

/* MOBILE MENU */

@media(max-width:900px){

nav{
flex-wrap:wrap;
}

nav a{
width:100%;
display:none;
padding:15px 0;
}

nav.active a{
display:block;
}

.menu-toggle{
display:block;
}

}

/* HERO */

.hero{
height:60vh;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
}

.btn{
padding:15px 40px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ff0055,#7000ff);
color:white;
font-size:18px;
cursor:pointer;
}

/* FOOTER */

footer{
padding:60px 20px;
text-align:center;
background:#0a0a0a;
margin-top:40px;
}

</style>

</head>

<body>

<!-- NAV -->
<nav>

<div class="menu-toggle" onclick="toggleMenu()">
<i class="fa-solid fa-bars"></i>
</div>

<a href="#">Home</a>
<a href="#">News</a>
<a href="#">Creators</a>
<a href="#">Creator of the Month</a>
<a href="#">About Us</a>
<a href="#">Member</a>

</nav>

<!-- HERO -->
<section class="hero">
<h1>CREATORS HYPE HUB</h1>
<p>Connect creators. Grow together. Get opportunities.</p>
<br>
<button class="btn">Join Hype Hub</button>
</section>

<footer>
<h2>Contact & Socials</h2>
<p>your@email.com</p>
</footer>

<script>

function toggleMenu(){
document.querySelector("nav").classList.toggle("active");
}

</script>

</body>
</html>
