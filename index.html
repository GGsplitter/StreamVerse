<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators Hype Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
min-height:100vh;
}

/*  MAIN WRAPPER (Navbar fix) */
main{
padding-top:100px;
}

/* HERO */

.hero{
height:60vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
}

.btn{
padding:15px 40px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ff0055,#7000ff);
color:white;
font-size:18px;
cursor:pointer;
}

/* SLIDER */

.sponsor{
background:#111;
padding:30px 0;
overflow:hidden;
}

.sponsor-track{
display:flex;
animation:loopTape 36s linear infinite;
}

.sponsor-track span{
padding:0 70px;
white-space:nowrap;
font-weight:bold;
}

@keyframes loopTape{
from{transform:translateX(0);}
to{transform:translateX(-33.333%);}
}

/* FOOTER */

footer{
padding:70px;
background:#0a0a0a;
text-align:center;
margin-top:auto;
}

footer a{
color:white;
font-size:28px;
text-decoration:none;
}

/* MOBILE */

@media(max-width:900px){

.hero h1{
font-size:40px;
}

.hero{
height:50vh;
}

}

</style>
</head>

<body>

<!--  NAVBAR -->
<div id="navbar"></div>

<main>

<!-- HERO -->
<section class="hero">
<h1>CREATORS HYPE HUB</h1>
<p>Connect creators. Grow together. Get opportunities.</p>
<br>
<button class="btn">Join Hype Hub</button>
</section>

<!-- SLIDER -->
<div class="sponsor">
<div class="sponsor-track">

<span>👑 Creator Of The Month</span>
<span>🔴 Live Content</span>
<span>🔝 Grow your community</span>
<span>🔗 Collabs</span>
<span>🌏 Visibility</span>

<span>👑 Creator Of The Month</span>
<span>🔴 Live Content</span>
<span>🔝 Grow your community</span>
<span>🔗 Collabs</span>
<span>🌏 Visibility</span>

</div>
</div>

</main>

<!--  FOOTER -->
<div id="footer"></div>

<script>

/* Load Navbar */
fetch("navbar.html")
.then(r => r.text())
.then(data => {
document.getElementById("navbar").innerHTML = data;
});

/* Load Footer */
fetch("footer.html")
.then(r => r.text())
.then(data => {
document.getElementById("footer").innerHTML = data;
});

</script>

</body>
</html>
