<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators Hype Hub</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
min-height:100vh;
}

/* ⭐ HERO */

main{
padding-top:100px;
}

.hero{
height:60vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

position:relative;
}

/* ⭐ PREMIUM TEXT STYLE */

.hero h1{
font-size:70px;
font-weight:900;
letter-spacing:2px;

background:linear-gradient(45deg,#ff4da6,#5b4dff,#00c3ff);
-webkit-background-clip:text;
color:transparent;

text-shadow:
0 0 20px rgba(255,0,150,.4),
0 0 40px rgba(0,0,0,.6);
}

.hero p{
font-size:22px;
opacity:.9;
max-width:600px;
margin:auto;
}

/* ⭐ BUTTON */

.btn{
padding:15px 40px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ff0055,#7000ff);
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

/* ⭐ SIDE LOGO (NAV + TEXT VÄLI) */

.hero-logo{
position:absolute;
left:8%;
top:45%;
transform:translateY(-50%);
z-index:2;
}

.hero-logo img{
height:200px;
width:auto;
filter:drop-shadow(0 0 30px rgba(255,0,150,.7));
transition:.3s;
}

.hero-logo img:hover{
transform:scale(1.05);
}

/* ⭐ SLIDER */

.sponsor{
background:#111;
padding:30px 0;
overflow:hidden;
}

.sponsor-track{
display:flex;
animation:loopTape 36s linear infinite;
}

.sponsor-track span{
padding:0 70px;
white-space:nowrap;
font-weight:bold;
}

@keyframes loopTape{
from{transform:translateX(0);}
to{transform:translateX(-33.333%);}
}

/* FOOTER */

footer{
padding:70px;
background:#0a0a0a;
text-align:center;
margin-top:auto;
}

footer a{
color:white;
font-size:28px;
text-decoration:none;
}

</style>
</head>

<body>

<div id="navbar"></div>

<main>

<section class="hero">

<!-- ⭐ LOGO -->
<div class="hero-logo">
<img src="CHH_LOGO.png">
</div>

<h1>CREATORS HYPE HUB</h1>

<p>
Connect creators. Grow together. Get opportunities.
</p>

<button class="btn">Join Hype Hub</button>

</section>

<div class="sponsor">
<div class="sponsor-track">

<span>👑 Creator Of The Month</span>
<span>🔴 Live Content</span>
<span>🔝 Grow your community</span>
<span>🔗 Collabs</span>
<span>🌏 Visibility</span>

<span>👑 Creator Of The Month</span>
<span>🔴 Live Content</span>
<span>🔝 Grow your community</span>
<span>🔗 Collabs</span>
<span>🌏 Visibility</span>

</div>
</div>

</main>

<div id="footer"></div>

<script>

/* Navbar */
fetch("navbar.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("navbar").innerHTML=d;
});

/* Footer */
fetch("footer.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("footer").innerHTML=d;
});

</script>

</body>
</html>
