<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
min-height:100vh;

background:
linear-gradient(rgba(6,6,6,0.65),rgba(6,6,6,0.95)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

section{
padding:140px 8%;
text-align:center;
}

.page-title{
font-size:50px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:60px;
}

.members{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:rgba(17,17,17,0.9);
border-radius:20px;
padding:30px 20px;

display:flex;
flex-direction:column;
align-items:center;
gap:15px;

text-decoration:none;
color:white;
transition:.3s;

box-shadow:
0 0 15px rgba(0,0,0,.6),
0 0 40px rgba(0,0,0,.3);
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
}

.card.live{
border:1px solid rgba(0,255,120,.6);
box-shadow:
0 0 25px rgba(0,255,120,.6),
0 0 80px rgba(0,255,120,.3);
}

.viewer{
font-size:14px;
opacity:.85;
white-space:pre-line;
}

.offline{
opacity:.7;
}

</style>
</head>

<body>

<section>

<h2 class="page-title">Creators</h2>

<div class="members" id="members"></div>

</section>

<script>

const channels = [
"G3splitter",
"Koeda666",
"Nallegamerx",
"lofigirl"
];

async function loadData(){

const membersDiv = document.getElementById("members");
if(!membersDiv) return;

try{

const res = await fetch(
"/api/twitchuser?logins=" + channels.join(",")
);

const data = await res.json();

const users = data.users || [];
const streams = data.streams || [];

membersDiv.innerHTML = "";

channels.forEach(channel=>{

const user = users.find(
u => u.login.toLowerCase() === channel.toLowerCase()
);

const stream = streams.find(
s => s.user_login.toLowerCase() === channel.toLowerCase()
);

const card = document.createElement("a");

card.className="card";
card.href=`https://twitch.tv/${channel}`;
card.target="_blank";

const profileImage =
user?.profile_image_url ||
"https://placehold.co/110x110";

if(stream){
card.classList.add("live");
}

card.innerHTML = `
<img src="${profileImage}">
<h3>${channel}</h3>
<div class="viewer">
${stream ?
`🟢 LIVE
👁 ${stream.viewer_count} viewers
🎮 ${stream.game_name || ""}
📺 ${stream.title || ""}`
:
`🔴 OFFLINE`
}
</div>
`;

membersDiv.appendChild(card);

});

}catch(err){
console.error(err);
}

}

document.addEventListener("DOMContentLoaded",loadData);

</script>
