<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
color:white;

background:
linear-gradient(rgba(6,6,6,0.65),rgba(6,6,6,0.95)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* CONTENT */

section{
padding:180px 8% 140px 8%;
}

.page-title{
text-align:center;
font-size:50px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:60px;
}

/* GRID */

.members{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:16px;
}

/* CARD */

.card{
background:#111;
border-radius:14px;
padding:10px;
transition:.3s;
text-decoration:none;
color:white;

display:flex;
flex-direction:column;
align-items:center;

min-height:150px;

position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-6px);
}

.thumb-preview{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:.35s ease;
pointer-events:none;
}

.card:hover .thumb-preview{
opacity:.35;
transform:scale(1.1);
}

/* PROFILE */

.card img.profile{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #111;
}

.card h3{
margin:6px 0;
font-size:16px;
}

/* LIVE */

.card.live{
border:1px solid #00ff7a;
box-shadow:
0 0 20px rgba(0,255,120,.6),
0 0 60px rgba(0,255,120,.25);
}

.card.live .profile{
border:2px solid #00ff7a;
box-shadow:
0 0 12px rgba(0,255,120,.9),
0 0 25px rgba(0,255,120,.4);
}

/* FOOTER */

footer{
padding:80px;
background:#0a0a0a;
margin-top:120px;
text-align:center;
}

</style>
</head>

<body>

<!-- ⭐ NAVBAR LOAD -->
<div id="navbar"></div>

<section>

<h2 class="page-title">Creators</h2>

<div class="members" id="members"></div>

</section>

<!-- ⭐ FOOTER LOAD -->
<div id="footer"></div>

<script>

/* Load navbar */
fetch("navbar.html")
.then(r => r.text())
.then(data => {
document.getElementById("navbar").innerHTML = data;
});

/* Load footer */
fetch("footer.html")
.then(r => r.text())
.then(data => {
document.getElementById("footer").innerHTML = data;
});

const channels = [
"G3splitter",
"Koeda666",
"Nallegamerx",
"lofigirl",
"Aydan",
"diazbiffle",
"imangelikaa",
"timthetatman",
"lydiaviolet",
"nickmercs",
"tfue"
];

async function loadData(){

const membersDiv = document.getElementById("members");
membersDiv.innerHTML = "";

const res = await fetch(
"/api/twitchuser?logins=" + channels.join(",")
);

const data = await res.json();

const users = data.users || [];
const streams = data.streams || [];

const cards = [];

channels.forEach(channel=>{

const user = users.find(
u => u.login.toLowerCase() === channel.toLowerCase()
);

const stream = streams.find(
s => s.user_login.toLowerCase() === channel.toLowerCase()
);

cards.push({channel,user,stream});

});

cards.sort((a,b)=>{

if(a.stream && b.stream){
return new Date(a.stream.started_at) - new Date(b.stream.started_at);
}

return (b.stream ? 1 : 0) - (a.stream ? 1 : 0);

});

cards.forEach(item=>{

const card=document.createElement("a");

card.className="card";
card.href=`https://twitch.tv/${item.channel}`;
card.target="_blank";

const profileImage =
item.user?.profile_image_url ||
"https://placehold.co/110x110";

if(item.stream){
card.classList.add("live");
}

const thumbnailUrl = item.stream
? `https://static-cdn.jtvnw.net/previews-ttv/live_user_${item.channel.toLowerCase()}-320x180.jpg`
: null;

card.innerHTML = `

${thumbnailUrl ? `
<img src="${thumbnailUrl}" class="thumb-preview">
` : ""}

<div class="card-center">

<img src="${profileImage}" class="profile">

<h3>${item.channel}</h3>

<div class="viewer">

${item.stream ?
`
🎮 ${item.stream.game_name || ""}  
📺 ${item.stream.title || ""}
`
:
`
🔴 OFFLINE
`
}

</div>

</div>

`;

membersDiv.appendChild(card);

});

}

document.addEventListener("DOMContentLoaded",loadData);
setInterval(loadData, 30000);

</script>

</body>
</html>
