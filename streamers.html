<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Creators</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ========================= */
/* BASE */
/* ========================= */

body{
margin:0;
font-family:Arial;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;

/* ⭐ INDEX BACKGROUND */
background:
linear-gradient(rgba(6,6,6,0.65),rgba(6,6,6,0.95)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1920&q=80");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* ========================= */
/* NAV */
/* ========================= */

nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
gap:30px;
backdrop-filter:blur(20px);
background:rgba(0,0,0,0.7);
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* ========================= */
/* CONTENT */
/* ========================= */

section{
padding:140px 8%;
text-align:center;
}

.page-title{
font-size:50px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:60px;
}

/* ========================= */
/* GRID */
/* ========================= */

.members{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

/* ========================= */
/* CARD */
/* ========================= */

.card{
background:rgba(17,17,17,0.9);
backdrop-filter:blur(18px);
border-radius:20px;
padding:30px 20px;
transition:.3s;
color:white;
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
gap:15px;

/* default glow */
box-shadow:
0 0 15px rgba(0,0,0,.6),
0 0 40px rgba(0,0,0,.3);
}

.card:hover{
transform:translateY(-10px);
}

/* ========================= */
/* PROFILE IMAGE */
/* ========================= */

.card img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
transition:.3s;
}

/* ========================= */
/* LIVE = GREEN */
/* ========================= */

.card.live{
box-shadow:
0 0 25px rgba(0,255,120,.6),
0 0 80px rgba(0,255,120,.3);
border:1px solid rgba(0,255,120,.6);
}

.card.live img{
border:4px solid #00ff7a;
box-shadow:0 0 20px rgba(0,255,120,.9);
}

/* ========================= */
/* OFFLINE = RED */
/* ========================= */

.card:not(.live){
box-shadow:
0 0 25px rgba(255,0,80,.5),
0 0 80px rgba(255,0,80,.25);
border:1px solid rgba(255,0,80,.4);
}

.card:not(.live) img{
border:4px solid #ff0055;
box-shadow:0 0 20px rgba(255,0,80,.8);
}

/* ========================= */
/* VIEWER TEXT */
/* ========================= */

.viewer{
font-size:14px;
opacity:.85;
white-space:pre-line;
}

/* ========================= */
/* FOOTER */
/* ========================= */

footer{
padding:80px;
background:#0a0a0a;
margin-top:auto;
text-align:center;
}

footer a{
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="news.html">News</a>
<a href="streamers.html">Creators</a>
<a href="creatorofthemonth.html">Creator Of The Month</a>
<a href="about.html">About Us</a>
<a href="member.html">Member</a>
</nav>

<section>

<h2 class="page-title">Creators</h2>

<div class="members" id="members"></div>

</section>

<script>

const channels = [
"G3splitter",
"Koeda666",
"Nallegamerx",
"lofigirl"
];

async function getToken(){
const res = await fetch("/api/token");
return await res.json();
}

async function loadData(){

const membersDiv = document.getElementById("members");
membersDiv.innerHTML = "";

const tokenData = await getToken();

for(const channel of channels){

const card = document.createElement("a");
card.className = "card";
card.href = `https://twitch.tv/${channel}`;
card.target = "_blank";

try{

const userRes = await fetch(
`/api/twitchuser?login=${channel}&token=${tokenData.access_token}`
);

const data = await userRes.json();

const user = data.user.data?.[0];
const stream = data.live.data?.[0];

const profileImage =
user?.profile_image_url ||
"https://placehold.co/110x110";

if(stream){
card.classList.add("live");
}

card.innerHTML = `
<img src="${profileImage}">
<h3>${channel}</h3>
<div class="viewer">
${stream ? `
🟢 LIVE
👁 ${stream.viewer_count} viewers
🎮 ${stream.game_name || ""}
📺 ${stream.title || ""}
` : "🔴 OFFLINE"}
</div>
`;

}catch(e){

card.innerHTML = `
<h3>${channel}</h3>
<div>Error loading data</div>
`;

}

membersDiv.appendChild(card);

}

}

document.addEventListener("DOMContentLoaded", loadData);

</script>

</div>

</footer>

</body>
</html>
