<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* SINUN OMA CSS — EN MUUTTANUT */

body{
margin:0;
font-family:Arial;
color:white;

background:
linear-gradient(rgba(6,6,6,0.65),rgba(6,6,6,0.95)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

section{
padding:180px 8% 140px 8%;
}

.page-title{
text-align:center;
font-size:50px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:60px;
}

.members{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:16px;
}

</style>
</head>

<body>

<!-- NAV -->
<div id="navbar"></div>

<section>

<h2 class="page-title">Creators</h2>

<div class="members" id="members"></div>

</section>

<!-- FOOTER -->
<div id="footer"></div>

<script>

/* ONLY NAV + FOOTER LOADING */

fetch("navbar.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("navbar").innerHTML=data;
});

fetch("footer.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});

</script>

</body>
</html>
