<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
color:white;

background:
linear-gradient(rgba(6,6,6,0.65),rgba(6,6,6,0.95)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
gap:30px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(20px);
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* CONTENT */

section{
padding:180px 8% 140px 8%;
}

.page-title{
text-align:center;
font-size:50px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:60px;
}

/* GRID */

.members{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

/* CARD */

.card{
background:#111;
border-radius:20px;
padding:30px 20px;
transition:.3s;
text-decoration:none;
color:white;

display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
}

/*  LIVE PROFILE IMAGE GREEN RING */

.card.live img{
border:4px solid #00ff7a;
box-shadow:
0 0 20px rgba(0,255,120,.7);
}

.card.live{
box-shadow:
0 0 25px rgba(0,255,120,.6),
0 0 80px rgba(0,255,120,.3);
border:1px solid rgba(0,255,120,.6);
}

.viewer{
font-size:14px;
opacity:.85;
white-space:pre-line;
}

/*  OFFLINE DEFAULT (HIMMEÄ RED GLOW) */

.card:not(.live){
border:1px solid rgba(255,0,80,.3);
box-shadow:
0 0 15px rgba(255,0,80,.15),
0 0 40px rgba(255,0,80,.1);
}

/*  OFFLINE HOVER = SAMANLAINEN KUIN LIVE GLOW */

.card:not(.live):hover{
box-shadow:
0 0 25px rgba(255,0,80,.6),
0 0 80px rgba(255,0,80,.35);
transform:translateY(-10px);
}
  
/*  NEWS STYLE FOOTER */

footer{
padding:80px;
background:#0a0a0a;
margin-top:120px;
text-align:center;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="news.html">News</a>
<a href="streamers.html">Creators</a>
<a href="about.html">About</a>
<a href="member.html">Member</a>
</nav>

<section>

<h2 class="page-title">Creators</h2>

<div class="members" id="members"></div>

</section>

<!-- FOOTER (NEWS STYLE) -->

<footer>

<h2>Contact & Socials</h2>

<p style="font-size:16px;">
Email:
<a href="mailto:your@email.com"
style="color:white;text-decoration:none;">
your@email.com
</a>
</p>

<div style="margin-top:25px;display:flex;justify-content:center;gap:30px;">

<a href="#"><i class="fab fa-instagram" style="font-size:28px;color:white;"></i></a>
<a href="#"><i class="fab fa-x-twitter" style="font-size:28px;color:white;"></i></a>
<a href="#"><i class="fab fa-twitch" style="font-size:28px;color:white;"></i></a>
<a href="#"><i class="fab fa-facebook" style="font-size:28px;color:white;"></i></a>
<a href="#"><i class="fab fa-tiktok" style="font-size:28px;color:white;"></i></a>
<a href="#"><i class="fab fa-youtube" style="font-size:28px;color:white;"></i></a>

</div>

<p style="margin-top:40px;opacity:.7">
© 2026 CREATORS Hype Hub
</p>

</footer>

<script>

const channels = [
"G3splitter",
"Koeda666",
"Nallegamerx",
"lofigirl"
];

async function loadData(){

const membersDiv = document.getElementById("members");

const res = await fetch(
"/api/twitchuser?logins=" + channels.join(",")
);

const data = await res.json();

const users = data.users || [];
const streams = data.streams || [];

membersDiv.innerHTML = "";

channels.forEach(channel=>{

const user = users.find(
u => u.login.toLowerCase() === channel.toLowerCase()
);

const stream = streams.find(
s => s.user_login.toLowerCase() === channel.toLowerCase()
);

const card = document.createElement("a");

card.className="card";
card.href=`https://twitch.tv/${channel}`;
card.target="_blank";

const profileImage =
user?.profile_image_url ||
"https://placehold.co/110x110";

if(stream){
card.classList.add("live");
}

card.innerHTML = `
<img src="${profileImage}">
<h3>${channel}</h3>
<div class="viewer">
${stream ?
`🟢 LIVE
👁 ${stream.viewer_count}
🎮 ${stream.game_name || ""}
📺 ${stream.title || ""}`
:
`🔴 OFFLINE`}
</div>
`;

membersDiv.appendChild(card);

});

}

document.addEventListener("DOMContentLoaded",loadData);

</script>

</body>
</html>
