<style>

body{
margin:0;
font-family:Arial;
background:#060606;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
gap:30px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(20px);
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* SECTION */

section{
padding:140px 8%;
text-align:center;
}

/* TITLE */

.page-title{
font-size:50px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:60px;
}

/* MEMBERS GRID */

.members{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

/* CARD */

.card{
background:#111;
border-radius:20px;
padding:30px 20px;
transition:.3s;
color:white;
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.card:hover{
transform:translateY(-10px);
}

/* PROFILE IMAGE */

.card img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid #ff0055;
}

/* LIVE STATE */

.card.live{
box-shadow:0 0 25px rgba(0,255,120,.5);
border:1px solid rgba(0,255,120,.6);
}

.card.live img{
border:4px solid #00ff7a !important;
box-shadow:0 0 20px rgba(0,255,120,.9);
}

.viewer{
font-size:14px;
opacity:.85;
white-space:pre-line;
}

/* FOOTER */

footer{
padding:80px;
background:#0a0a0a;
margin-top:auto;
text-align:center;
}

footer a{
color:white;
text-decoration:none;
font-size:16px;
}

</style>

<script>

const channels = [
"G3splitter",
"Koeda666",
"Nallegamerx",
"RdcWaitingRoom_"
];

async function getToken(){
const res = await fetch("/api/token");
return await res.json();
}

async function loadData(){

const membersDiv = document.getElementById("members");
membersDiv.innerHTML = "";

const tokenData = await getToken();

for(const channel of channels){

const card = document.createElement("a");
card.className = "card";
card.href = `https://twitch.tv/${channel}`;
card.target = "_blank";

try{

const userRes = await fetch(
`/api/twitchuser?login=${channel}&token=${tokenData.access_token}`
);

const data = await userRes.json();

const user = data.user.data?.[0];
const stream = data.live.data?.[0];

const profileImage = user?.profile_image_url 
? `https://static-cdn.jtvnw.net/${user.profile_image_url}`
: "https://placehold.co/110x110";

if(stream){
card.classList.add("live");
}

card.innerHTML = `
<img src="${profileImage}">
<h3>${channel}</h3>
<div class="viewer">
${stream ? `
🟢 LIVE
👁 ${stream.viewer_count} viewers
🎮 ${stream.game_name || ""}
📺 ${stream.title || ""}
` : "⚫ OFFLINE"}
</div>
`;

}catch(e){
card.innerHTML = `
<h3>${channel}</h3>
<div>Error loading data</div>
`;
}

membersDiv.appendChild(card);
}

}

document.addEventListener("DOMContentLoaded", loadData);

</script>
