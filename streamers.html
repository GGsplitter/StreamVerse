<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
color:white;

background:
linear-gradient(rgba(6,6,6,0.65),rgba(6,6,6,0.95)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
gap:30px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(20px);
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* CONTENT */

section{
padding:180px 8% 140px 8%;
}

.page-title{
text-align:center;
font-size:50px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:60px;
}

/* GRID */

.members{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

/* CARD */

.card{
background:#111;
border-radius:18px;
padding:16px;
transition:.3s;
text-decoration:none;
color:white;

display:flex;
flex-direction:column;

min-height:200px;
justify-content:flex-start;
}

.card:hover{
transform:translateY(-8px);
}

/* CARD HEADER */

.card-header{
display:flex;
align-items:center;
justify-content:space-between;
width:100%;
}

.card-user{
display:flex;
align-items:center;
gap:12px;
}

/* PROFILE */

.card img.profile{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
border:3px solid #111;
}

/* LIVE CARD */

.card.live{
border:1px solid #00ff7a;
box-shadow:
0 0 20px rgba(0,255,120,.6),
0 0 60px rgba(0,255,120,.25);
}

.card.live .profile{
border:3px solid #00ff7a;
box-shadow:
0 0 12px rgba(0,255,120,.9),
0 0 25px rgba(0,255,120,.4);
}

/* OFFLINE */

.card:not(.live){
border:1px solid rgba(255,0,80,.3);
box-shadow:
0 0 15px rgba(255,0,80,.15),
0 0 40px rgba(255,0,80,.1);
}

.card:not(.live):hover{
box-shadow:
0 0 25px rgba(255,0,80,.6),
0 0 80px rgba(255,0,80,.35);
}

/* VIEWER TEXT */

.viewer{
font-size:14px;
opacity:.85;
white-space:pre-line;
text-align:right;
}

/* FOOTER */

footer{
padding:80px;
background:#0a0a0a;
margin-top:120px;
text-align:center;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="news.html">News</a>
<a href="streamers.html">Creators</a>
<a href="about.html">About</a>
<a href="member.html">Member</a>
</nav>

<section>

<h2 class="page-title">Creators</h2>

<div class="members" id="members"></div>

</section>

<footer>

<h2>Contact & Socials</h2>

<p>
Email:
<a href="mailto:your@email.com" style="color:white">
your@email.com
</a>
</p>

<div style="margin-top:25px;display:flex;justify-content:center;gap:30px;">
<i class="fab fa-instagram" style="font-size:28px"></i>
<i class="fab fa-x-twitter" style="font-size:28px"></i>
<i class="fab fa-twitch" style="font-size:28px"></i>
<i class="fab fa-facebook" style="font-size:28px"></i>
<i class="fab fa-tiktok" style="font-size:28px"></i>
<i class="fab fa-youtube" style="font-size:28px"></i>
</div>

<p style="margin-top:40px;opacity:.7">
© 2026 CREATORS Hype Hub
</p>

</footer>

<script>

const channels = [
"G3splitter",
"Koeda666",
"Nallegamerx",
"lofigirl"
];

async function loadData(){

const membersDiv = document.getElementById("members");
membersDiv.innerHTML = "";

const res = await fetch(
"/api/twitchuser?logins=" + channels.join(",")
);

const data = await res.json();

const users = data.users || [];
const streams = data.streams || [];

const cards = [];

channels.forEach(channel=>{

const user = users.find(
u => u.login.toLowerCase() === channel.toLowerCase()
);

const stream = streams.find(
s => s.user_login.toLowerCase() === channel.toLowerCase()
);

cards.push({
channel,
user,
stream
});

});

cards.sort((a,b)=>{
return (b.stream ? 1 : 0) - (a.stream ? 1 : 0);
});

cards.forEach(item=>{

const card = document.createElement("a");

card.className="card";
card.href=`https://twitch.tv/${item.channel}`;
card.target="_blank";

const profileImage =
item.user?.profile_image_url ||
"https://placehold.co/110x110";

const thumbnail =
item.stream
? item.stream.thumbnail_url
.replace("{width}", "320")
.replace("{height}", "180")
: null;

if(item.stream){
card.classList.add("live");
}

card.innerHTML = `

<div class="card-header">

<div class="card-user">
<img src="${profileImage}" class="profile">
<h3>${item.channel}</h3>
</div>

<div class="viewer">
${item.stream ?
`🟢 LIVE<br>
👁 ${item.stream.viewer_count}`
:
`🔴 OFFLINE`}
</div>

</div>

${thumbnail ? `
<img src="${thumbnail}"
style="width:100%;height:120px;border-radius:12px;object-fit:cover;margin-top:12px;">
` : ""}

`;

membersDiv.appendChild(card);

});

}

document.addEventListener("DOMContentLoaded",loadData);

</script>

</body>
</html>
