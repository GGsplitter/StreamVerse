<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>
body{
    margin:0;
    background:#060606;
    color:white;
    font-family:Arial;
}

#navbar{
    width:100%;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
}

.page-wrapper{
    display:flex;
    margin-top:80px;
    min-height:100vh;
}

#sidebar{
    width:260px;
}

.main{
    margin-left:260px;
    padding:40px;
    width:calc(100% - 260px);
}

.profile-container{
    max-width:900px;
    margin:0 auto;
}

/* ⭐ Profiilikortti banneritaustalla */
.profile-header{
    position:relative;
    padding:40px;
    border-radius:20px;
    background-size:cover;
    background-position:center;
    background-color:#111;
    box-shadow:0 0 20px rgba(255,255,200,0.15);
    border:1px solid rgba(255,255,255,0.05);
}

/* Tumma overlay bannerin päällä */
.profile-header::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
    border-radius:20px;
}

.profile-header-content{
    position:relative;
    display:flex;
    gap:25px;
    align-items:center;
    z-index:2;
}

/* ⭐ Bannerin muokkaus (harmaa kynä) */
.edit-banner{
    position:absolute;
    bottom:15px;
    right:15px;
    background:rgba(255,255,255,0.25);
    color:#000;
    padding:8px 12px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    font-weight:bold;
    opacity:0.7;
    backdrop-filter:blur(4px);
    transition:0.2s;
    z-index:3;
}
.edit-banner:hover{
    opacity:1;
}

.avatar-wrapper{
    position:relative;
    width:110px;
    height:110px;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:#222;
    background-size:cover;
    background-position:center;
    box-shadow:0 0 12px rgba(255,255,200,0.25);
}

/* ⭐ Avatarin muokkaus (harmaa kynä) */
.edit-avatar{
    position:absolute;
    bottom:0;
    right:0;
    background:rgba(255,255,255,0.25);
    color:#000;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    cursor:pointer;
    font-weight:bold;
    opacity:0.7;
    backdrop-filter:blur(4px);
    transition:0.2s;
}
.edit-avatar:hover{
    opacity:1;
}

.profile-info h1{
    margin:0;
    font-size:28px;
    background:linear-gradient(45deg,#ffffff,#ffe680);
    -webkit-background-clip:text;
    color:transparent;
    display:flex;
    align-items:center;
    gap:10px;
}

/* ⭐ Muokkauslaatikot */
.settings-box{
    background:#111;
    padding:20px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.05);
    margin-top:25px;
}

.settings-box h3{
    margin-top:0;
}

.settings-box input,
.settings-box textarea{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:8px;
    background:#222;
    color:white;
}

.settings-box button{
    margin-top:10px;
    padding:10px 15px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    background:#ffe680;
    color:#000;
    font-weight:bold;
}

/* ⭐ GRID (ennallaan) */
.profile-grid{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.small-card{
    background:#111;
    padding:20px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 0 10px rgba(255,255,200,0.10);
}

.small-card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 14px rgba(255,255,200,0.20);
}

.social-icons{
    display:flex;
    gap:12px;
    margin-top:10px;
}

.social-icons img{
    width:28px;
    height:28px;
    opacity:.85;
    transition:.2s;
}

.social-icons img:hover{
    opacity:1;
    transform:scale(1.1);
}

.custom-links{
    list-style:none;
    padding:0;
    margin:10px 0;
}

.custom-links li{
    margin-bottom:6px;
}

.custom-links a{
    color:#ffe680;
    text-decoration:none;
    font-size:14px;
}

.add-link-btn,
.linkbio-btn{
    margin-top:10px;
    padding:10px 15px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    background:#ffe680;
    color:#000;
    font-weight:bold;
}

#profile-status{
    margin-top:15px;
    opacity:0.8;
}

/* Piilotetut inputit */
#banner-input,
#avatar-input {
    display: none;
}

/* username laatikko */
#username-input {
    width: 250px;       /* lyhyempi kenttä */
    display: block;     /* oma rivinsä */
    margin-top: 8px;
}

#save-username-btn {
    display: block;     /* nappi omalle riville */
    margin-top: 10px;
}

/* bio laatikko */
#bio-input {
    width: 100%;
    max-width: 500px;   /* ei veny koko sivun leveydelle */
    display: block;
    margin-top: 8px;
}

#save-bio-btn {
    display: block;
    margin-top: 10px;
}

</style>
</head>

<body>

<div id="navbar"></div>

<div class="page-wrapper">

  <div id="sidebar"></div>

  <div class="main">

    <div class="profile-container">

      <!-- ⭐ Profiilikortti banneritaustalla -->
      <div class="profile-header" id="banner-area">

        <!-- Bannerin muokkaus -->
        <div class="edit-banner" onclick="document.getElementById('banner-input').click()">✏️</div>

        <div class="profile-header-content">

          <div class="avatar-wrapper">
            <div class="avatar" id="avatar-preview"></div>
            <div class="edit-avatar" onclick="document.getElementById('avatar-input').click()">✏️</div>
          </div>

          <div class="profile-info">
            <h1 id="username-display">@username</h1>
          </div>

        </div>

      </div>

      <!-- Piilotetut inputit -->
      <input type="file" id="banner-input" accept="image/*">
      <input type="file" id="avatar-input" accept="image/*">

      <!-- ⭐ Nimimerkin muokkaus -->
      <div class="settings-box">
        <h3>Nimimerkki</h3>
        <input type="text" id="username-input">
        <button id="save-username-btn">Tallenna nimimerkki</button>
      </div>

      <!-- ⭐ Bio muokkaus -->
      <div class="settings-box">
        <h3>Bio</h3>
        <textarea id="bio-input" rows="4"></textarea>
        <button id="save-bio-btn">Tallenna bio</button>
      </div>

      <!-- ⭐ GRID (ennallaan) -->
      <div class="profile-grid">

        <div class="small-card">
          <h3>Socials</h3>
          <div class="social-icons">
            <img src="assets/icons/tiktok.png">
            <img src="assets/icons/youtube.png">
            <img src="assets/icons/instagram.png">
            <img src="assets/icons/twitch.png">
            <img src="assets/icons/X.png">
          </div>
        </div>

        <div class="small-card">
          <h3>Omat linkit</h3>
          <ul class="custom-links">
              <li><a href="#">Merch Store</a></li>
              <li><a href="#">Portfolio</a></li>
              <li><a href="#">Kotisivu</a></li>
          </ul>
          <button class="add-link-btn">Lisää linkki</button>
        </div>

        <div class="small-card">
          <h3>Link‑in‑Bio</h3>
          <p>Luo oma sivu, jossa kaikki linkkisi yhdessä paikassa.</p>
          <button class="linkbio-btn" onclick="window.location.href='link-in-bio-editor.html'">
            Luo Link‑in‑Bio
          </button>
        </div>

      </div>

      <div id="profile-status"></div>

    </div>

  </div>

</div>

<script>
fetch("../navbar.html").then(r=>r.text()).then(d=>document.getElementById("navbar").innerHTML=d);
fetch("../sidebarnav.html").then(r=>r.text()).then(d=>document.getElementById("sidebar").innerHTML=d);
</script>

<!-- ⭐ Profiililogiikka -->
<script type="module" src="../js/profile.js"></script>

</body>
</html>
