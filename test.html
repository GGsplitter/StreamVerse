<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creators</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    background:
    linear-gradient(rgba(6,6,6,0.65),rgba(6,6,6,0.95)),
    url("https://images.unsplash.com/photo-1542751371-adc38448a05e");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

#navbar{ position:relative; z-index:1000; }


section{ padding:180px 8% 140px 8%; }

.page-title{
    text-align:center;
    font-size:50px;
    background:linear-gradient(45deg,#ff0055,#7000ff);
    -webkit-background-clip:text;
    color:transparent;
    margin-bottom:40px;
}


/* TOP TAB MENU */
.tabs{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:40px;
}

.tabs button{
    background:#111;
    border:1px solid #444;
    padding:10px 22px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    transition:.25s;
    font-size:15px;
}

.tabs button.active{
    border-color:#ff0088;
    box-shadow:0 0 12px #ff0088;
}

/* SECTION TITLE */
.cat-title{
    font-size:28px;
    margin:40px 0 15px 0;
    background:linear-gradient(45deg,#ff0088,#7700ff);
    -webkit-background-clip:text;
    color:transparent;
}

/* GRID — 5 per rivi */
.grid{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:14px;
}

/* FOOTER */
footer{
    padding:80px;
    background:#0a0a0a;
    margin-top:120px;
    text-align:center;
}

/* ========================= */
/* COMPACT CREATOR PROFILE CARD */
/* ========================= */

.creator-card{
    width:100%;
    height:140px;
    background:#111;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(255,0,120,0.25);
    transition:.25s;
    cursor:pointer;
    text-decoration:none;
    color:white;
    display:block;
}

.creator-card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 18px rgba(255,0,120,0.45);
}

.creator-content{
    display:flex;
    flex-direction:row;
    padding:10px;
    gap:10px;
    height:140px;
}

.creator-profile-img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #222;
    flex-shrink:0;
}

.creator-info{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.creator-name{
    font-size:15px;
    margin:0;
    background:linear-gradient(45deg,#ff0088,#7700ff);
    -webkit-background-clip:text;
    color:transparent;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.creator-bio{
    margin-top:6px;
    opacity:0.75;
    font-size:11px;
    height:32px;
    overflow:hidden;
    line-height:1.25;
}

.creator-socials{
    margin-top:8px;
    display:flex;
    gap:8px;
}

.creator-socials a{
    font-size:14px;
    color:white;
    transition:.2s;
}

.creator-socials a:hover{
    color:#ff0088;
}

/* ========================= */
/* LIVE TOP PROFILE CARD */
/* ========================= */

.live-top-card{
    width:100%;
    height:140px;
    background:#111;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,255,120,0.25);
    transition:.25s;
    cursor:pointer;
    text-decoration:none;
    color:white;
    display:block;
}

.live-top-card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 18px rgba(0,255,120,0.45);
}

.live-top-content{
    display:flex;
    flex-direction:row;
    padding:10px;
    gap:10px;
    height:140px;
}

.live-top-img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #00ff7a;
}

.live-top-info{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.live-top-name{
    font-size:15px;
    margin:0;
    background:linear-gradient(45deg,#00ff7a,#00ffaa);
    -webkit-background-clip:text;
    color:transparent;
}

.live-top-bio{
    margin-top:6px;
    opacity:0.75;
    font-size:11px;
    height:32px;
    overflow:hidden;
    line-height:1.25;
}

.live-top-socials{
    margin-top:8px;
    display:flex;
    gap:8px;
}

/* ========================= */
/* TWITCH LIVE CARD */
/* ========================= */

.twitch-card{
    background:#111;
    border-radius:14px;
    padding:10px;
    transition:.3s;
    text-decoration:none;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:150px;
    position:relative;
    overflow:hidden;
}

.twitch-card:hover{ transform:translateY(-6px); }

.thumb-preview{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    opacity:0;
    transition:.35s ease;
    pointer-events:none;
}

.twitch-card:hover .thumb-preview{
    opacity:.35;
    transform:scale(1.1);
}

.card-top{
    display:flex;
    justify-content:space-between;
    width:100%;
    font-size:13px;
    opacity:.9;
    z-index:2;
}

.card-center{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    margin-top:8px;
    z-index:2;
}

.twitch-card img.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #111;
}

.twitch-card.live{
    border:1px solid #00ff7a;
    box-shadow:0 0 20px rgba(0,255,120,.6);
}

.twitch-card.live .profile{
    border:2px solid #00ff7a;
}

.viewer{
    font-size:12px;
    opacity:.85;
    text-align:center;
    margin-top:6px;
    white-space:pre-line;
}
</style>
</head>

<body>

<div id="navbar"></div>

<section>

<h2 class="page-title">Creators</h2>

<!-- TOP TAB MENU -->
<div class="tabs">
    <button class="active">Overview</button>
    <button onclick="location.href='allcreatorslist.html'">All Creators</button>
</div>

<!-- 1) UUSIMMAT SISÄLLÖNTUOTTAJAT -->
<h3 class="cat-title">🆕 Uusimmat sisällöntuottajat</h3>
<div class="grid" id="newest-creators-grid"></div>

<!-- 2) LIVE CREATORS -->
<h3 class="cat-title">🟢 Live Creators</h3>

<!-- YLÄPROFIILIKORTTI -->
<div class="grid" id="live-top-profile"></div>

<!-- LIVE-KORTIT -->
<div class="grid" id="live-grid"></div>

<div class="show-more"><a href="live-all.html">Näytä kaikki livet →</a></div>

<!-- 3) TRENDING -->
<h3 class="cat-title">🔥 Trending</h3>
<div class="grid" id="trending-grid"></div>

<!-- 4) UUSIMMAT VLOGIT / VIDEOT -->
<h3 class="cat-title">🎥 Uusimmat vlogit / videot</h3>
<div class="grid" id="vlog-grid"></div>
<div class="show-more"><a href="vlog-all.html">Näytä kaikki videot →</a></div>

</section>

<div id="footer"></div>

<script>
/* NAV + FOOTER */
fetch("navbar.html").then(r=>r.text()).then(d=>navbar.innerHTML=d);
fetch("footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);

/* MOCK-PROFIILIT UUSIMMAT SISÄLLÖNTUOTTAJAT */
const newestCreators = [
    {
        username: "G3splitter",
        profile: "https://placehold.co/200x200?text=G3",
        bio: "FPS pelaaja ja sisällöntuottaja.",
        youtube: "#",
        instagram: "#",
        twitter: "#",
        twitch: "#"
    },
    {
        username: "Koeda666",
        profile: "https://placehold.co/200x200?text=K6",
        bio: "IRL & Just Chatting.",
        twitter: "#"
    },
    {
        username: "Nallegamerx",
        profile: "https://placehold.co/200x200?text=NG",
        bio: "Rento pelistriimaaja.",
        youtube: "#",
        twitch: "#"
    },
    {
        username: "LofiGirl",
        profile: "https://placehold.co/200x200?text=LG",
        bio: "Lofi musiikkia 24/7.",
        instagram: "#"
    },
    {
        username: "NewMember",
        profile: "https://placehold.co/200x200?text=NM",
        bio: "Uusi sisällöntuottaja.",
        youtube: "#",
        instagram: "#",
        twitter: "#"
    }
];

function renderNewestCreators(){
    const grid = document.getElementById("newest-creators-grid");
    grid.innerHTML = "";

    newestCreators.forEach(c=>{
        const card = document.createElement("a");
        card.className = "creator-card";
        card.href = `creator.html?user=${c.username}`;

        card.innerHTML = `
            <div class="creator-content">
                <img src="${c.profile}" class="creator-profile-img">
                <div class="creator-info">
                    <h3 class="creator-name">${c.username}</h3>
                    <p class="creator-bio">${c.bio}</p>
                    <div class="creator-socials">
                        ${c.youtube ? `<a href="${c.youtube}"><i class="fab fa-youtube"></i></a>` : ""}
                        ${c.instagram ? `<a href="${c.instagram}"><i class="fab fa-instagram"></i></a>` : ""}
                        ${c.twitter ? `<a href="${c.twitter}"><i class="fab fa-x-twitter"></i></a>` : ""}
                        ${c.twitch ? `<a href="${c.twitch}"><i class="fab fa-twitch"></i></a>` : ""}
                    </div>
                </div>
            </div>
        `;

        grid.appendChild(card);
    });
}

/* TWITCH DATA LIVE / TRENDING / VLOG */
const channels = [
    "G3splitter","Koeda666","Nallegamerx","lofigirl",
    "Aydan","diazbiffle","imangelikaa","timthetatman",
    "lydiaviolet","nickmercs","tfue"
];

const clientId = "SUN_CLIENT_ID";
const accessToken = "SUN_ACCESS_TOKEN";

async function loadTwitchData(){
    try{
        const resUsers = await fetch(
            "https://api.twitch.tv/helix/users?login="+channels.join("&login="),
            { headers:{ "Client-ID":clientId, "Authorization":`Bearer ${accessToken}` } }
        );
        const users = (await resUsers.json()).data || [];

        const resStreams = await fetch(
            "https://api.twitch.tv/helix/streams?user_login="+channels.join("&user_login="),
            { headers:{ "Client-ID":clientId, "Authorization":`Bearer ${accessToken}` } }
        );
        const streams = (await resStreams.json()).data || [];

        const cards = channels.map(ch=>{
            return {
                channel: ch,
                user: users.find(u=>u.login.toLowerCase()==ch.toLowerCase()),
                stream: streams.find(s=>s.user_login.toLowerCase()==ch.toLowerCase())
            };
        });

        /* LIVE: kaikki livessä olevat */
        const liveAll = cards.filter(c => c.stream);

        /* Yläprofiilikortti */
        renderLiveTopProfile(liveAll[0]);

        /* Kaikki live-kortit */
        renderLiveCards("live-grid", liveAll);

        /* Trending + vlog placeholder */
        renderLiveCards("trending-grid", cards.slice(0,5));
        renderLiveCards("vlog-grid", cards.slice(0,5));

    }catch(e){
        console.error(e);
    }
}

/* Yläprofiilikortti → profiilisivulle */
function renderLiveTopProfile(item){
    const div = document.getElementById("live-top-profile");
    div.innerHTML = "";

    if(!item) return;

    const card = document.createElement("a");
    card.className = "live-top-card";
    card.href = `creator.html?user=${item.channel}`;

    const profile = item.user?.profile_image_url || "https://placehold.co/110x110";

    card.innerHTML = `
        <div class="live-top-content">
            <img src="${profile}" class="live-top-img">
            <div class="live-top-info">
                <h3 class="live-top-name">${item.channel}</h3>
                <p class="live-top-bio">${item.stream?.title || "Live stream"}</p>
                <div class="live-top-socials">
                    🟢 LIVE nyt
                </div>
            </div>
        </div>
    `;

    div.appendChild(card);
}

/* Live-kortit → suoraan Twitch-liveen */
function renderLiveCards(id, list){
    const div = document.getElementById(id);
    div.innerHTML = "";

    list.forEach(item=>{
        const card = document.createElement("a");
        card.className = "twitch-card live";
        card.href = `https://twitch.tv/${item.channel}`;
        card.target = "_blank";

        const profile = item.user?.profile_image_url || "https://placehold.co/110x110";
        const thumb = `https://static-cdn.jtvnw.net/previews-ttv/live_user_${item.channel.toLowerCase()}-320x180.jpg`;

        card.innerHTML = `
            <img src="${thumb}" class="thumb-preview">
            <div class="card-top">
                <div>🟢 LIVE</div>
                <div>⏱ ${formatDuration(item.stream.started_at)}</div>
            </div>
            <div class="card-center">
                <img src="${profile}" class="profile">
                <h3>${item.channel}</h3>
                <div class="viewer">
                    🎮 ${item.stream.game_name}<br>
                    📺 ${item.stream.title}
                </div>
            </div>
        `;

        div.appendChild(card);
    });
}

function formatDuration(start){
    const ms = Date.now() - new Date(start).getTime();
    const h = Math.floor(ms/3600000);
    const m = Math.floor((ms%3600000)/60000);
    return `${h}h ${m}m`;
}

document.addEventListener("DOMContentLoaded", ()=>{
    renderNewestCreators();
    loadTwitchData();
    setInterval(loadTwitchData, 30000);
});
</script>

</body>
</html>
