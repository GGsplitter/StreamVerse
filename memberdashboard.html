<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Creator Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  background:#060606;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* NAVBAR */
#navbar {
  width:100%;
  position:fixed;
  top:0;
  left:0;
  z-index:1000;
}

/* PAGE WRAPPER */
.page-wrapper{
  display:flex;
  flex:1;
  height:100%;
  margin-top:80px;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#0a0a0a;
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  gap:25px;
  border-right:2px solid #111;
}

.sidebar h2{
  font-size:22px;
  margin-bottom:10px;
}

.sidebar a{
  color:white;
  text-decoration:none;
  padding:12px 15px;
  border-radius:10px;
  background:#111;
  display:block;
  transition:.2s;
}

.sidebar a:hover{
  background:#222;
}

/* MAIN CONTENT */
.main{
  flex:1;
  padding:40px;
  overflow-y:auto;
}

/* HEADER */
.header{
  font-size:28px;
  font-weight:bold;
  margin-bottom:25px;
}

/* CARD */
.card{
  background:#111;
  padding:25px;
  border-radius:15px;
  margin-bottom:25px;
}

/* STATS GRID */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:40px;
}

.stat-box{
  background:#111;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

.stat-box h4{
  margin:0;
  font-size:18px;
  opacity:.8;
}

.stat-box span{
  font-size:32px;
  font-weight:bold;
  display:block;
  margin-top:10px;
}

/* LOGOUT BUTTON */
.logout-btn{
  margin-top:40px;
  padding:15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#ff0055,#7000ff);
  color:white;
  cursor:pointer;
  width:100%;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- PAGE WRAPPER -->
<div class="page-wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>Creator Hub</h2>

    <a href="#" onclick="showSection('overview')">📊 Overview</a>
    <a href="#" onclick="showSection('profile')">👤 Profile</a>
    <a href="#" onclick="showSection('leaderboard')">🏆 Leaderboard</a>
    <a href="#" onclick="showSection('rewards')">🎁 Rewards</a>
    <a href="#" onclick="showSection('collabs')">🤝 Collabs</a>
    <a href="#" onclick="showSection('settings')">⚙️ Settings</a>

    <button class="logout-btn" onclick="logoutUser()">Logout</button>

  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- OVERVIEW -->
    <div id="overview" class="section">
      <div class="header">Dashboard Overview</div>

      <div class="card">
        <h2>Creator Stats</h2>
        <p>Tähän tulee TikTok, YouTube, Twitch, kasvu jne.</p>
      </div>

      <div class="stats">
        <div class="stat-box"><h4>TikTok Followers</h4><span>12 450</span></div>
        <div class="stat-box"><h4>YouTube Subs</h4><span>3 210</span></div>
        <div class="stat-box"><h4>Twitch Followers</h4><span>980</span>
