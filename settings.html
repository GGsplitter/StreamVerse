<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Settings</title>

<style>
body{
    margin:0;
    background:#060606;
    color:white;
    font-family:Arial;
}

/* NAVBAR */
#navbar{
    width:100%;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
}

/* PAGE WRAPPER */
.page-wrapper{
    display:flex;
    margin-top:80px;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:#0a0a0a;
    padding:30px 20px;
    position:fixed;
    top:80px;
    left:0;
    height:100%;
    border-right:1px solid rgba(255,255,255,0.05);
    box-shadow:0 0 20px rgba(255,230,120,0.08);
}

.sidebar a{
    display:block;
    padding:12px;
    background:#111;
    margin-bottom:10px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    transition:.2s;
}

.sidebar a:hover{
    background:#1a1a1a;
    box-shadow:0 0 12px rgba(255,255,200,0.15);
}

/* MAIN CONTENT */
.main{
    margin-left:260px;
    padding:40px;
    width:100%;
}

/* PAGE TITLE */
.main h1{
    font-size:42px;
    margin-bottom:30px;
    background:linear-gradient(45deg,#ffffff,#ffe680);
    -webkit-background-clip:text;
    color:transparent;
}

/* SETTINGS GRID */
.settings-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

/* SETTINGS CARD */
.settings-card{
    background:#111;
    padding:25px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:
        0 0 10px rgba(255,255,200,0.10),
        0 0 18px rgba(0,0,0,0.4);
    transition:.25s;
}

.settings-card:hover{
    transform:translateY(-6px);
    box-shadow:
        0 0 14px rgba(255,255,200,0.20),
        0 0 25px rgba(255,230,120,0.15);
}

.settings-card h2{
    margin-top:0;
    margin-bottom:15px;
    font-size:22px;
    background:linear-gradient(45deg,#ffffff,#ffe680);
    -webkit-background-clip:text;
    color:transparent;
}

/* INPUTS */
.settings-card input,
.settings-card textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-top:8px;
    background:#222;
    color:white;
    font-size:14px;
}

.settings-card button{
    margin-top:12px;
    padding:10px 15px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    background:#ffe680;
    color:#000;
    font-weight:bold;
}

/* SOCIAL ICONS */
.social-icons{
    display:flex;
    gap:12px;
    margin-top:10px;
}

.social-icons img{
    width:32px;
    height:32px;
    opacity:.85;
    transition:.2s;
}

.social-icons img:hover{
    opacity:1;
    transform:scale(1.1);
}

/* DELETE ACCOUNT */
.delete-box{
    background:#200;
    padding:25px;
    border-radius:18px;
    border:1px solid rgba(255,0,0,0.3);
    box-shadow:0 0 15px rgba(255,0,0,0.2);
}

.delete-box h2{
    background:none;
    color:#ff6b6b;
}

.delete-btn{
    background:#ff4444;
    color:white;
    padding:12px 18px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

.delete-btn:hover{
    background:#ff2222;
}
</style>
</head>

<body>

<div id="navbar"></div>

<div class="page-wrapper">

  <div class="sidebar">
    <a href="overview.html">📊 Overview</a>
    <a href="profile.html">👤 Profile</a>
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <a href="rewards.html">🎁 Rewards</a>
    <a href="collabs.html">🤝 Collabs</a>
    <a href="settings.html">⚙️ Settings</a>
  </div>

  <div class="main">

    <h1>⚙️ Settings</h1>

    <div class="settings-grid">

      <!-- EMAIL -->
      <div class="settings-card">
        <h2>Sähköposti</h2>
        <input type="email" placeholder="creator@example.com">
        <button>Vaihda sähköposti</button>
      </div>

      <!-- PASSWORD -->
      <div class="settings-card">
        <h2>Salasana</h2>
        <button>Vaihda salasana</button>
      </div>

      <!-- SOCIAL MEDIA LINKS -->
      <div class="settings-card">
        <h2>Sosiaaliset mediat</h2>
        <div class="social-icons">
          <img src="assets/icons/tiktok.png">
          <img src="assets/icons/youtube.png">
          <img src="assets/icons/instagram.png">
          <img src="assets/icons/twitch.png">
          <img src="assets/icons/twitter.png">
        </div>
        <button>Muokkaa linkkejä</button>
      </div>

      <!-- NOTIFICATIONS -->
      <div class="settings-card">
        <h2>Ilmoitukset</h2>
        <label><input type="checkbox"> Uudet seuraajat</label><br>
        <label><input type="checkbox"> Kommentit</label><br>
        <label><input type="checkbox"> Yhteistyöpyynnöt</label><br>
        <label><input type="checkbox"> Tärkeät päivitykset</label><br>
        <button>Tallenna</button>
      </div>

      <!-- PRIVACY -->
      <div class="settings-card">
        <h2>Yksityisyys</h2>
        <label><input type="checkbox"> Profiili julkinen</label><br>
        <label><input type="checkbox"> Näytä seuraajamäärät</label><br>
        <label><input type="checkbox"> Näytä some‑linkit</label><br>
        <button>Tallenna</button>
      </div>

      <!-- SECURITY -->
      <div class="settings-card">
        <h2>Turvallisuus</h2>
        <button>Ota 2FA käyttöön</button>
        <button style="margin-top:10px;">Näytä kirjautuneet laitteet</button>
      </div>

      <!-- DELETE ACCOUNT -->
      <div class="delete-box">
        <h2>Poista tili</h2>
        <p>Tämä toiminto on pysyvä. Kaikki tietosi poistetaan.</p>
        <button class="delete-btn">Poista tili pysyvästi</button>
      </div>

    </div>

  </div>

</div>

<script>
fetch("../navbar.html")
  .then(r=>r.text())
  .then(d=>document.getElementById("navbar").innerHTML=d);
</script>

<!-- SUPABASE CLIENT -->
<script type="module" src="./js/supabase.js"></script>

<!-- SUPABASE LOGIC -->
<script type="module">

import { supabase } from "./js/supabase.js"

window.onload = async () => {
  const { data } = await supabase.auth.getUser()
  if(!data.user){ window.location.href="index.html"; return }
}

window.logoutUser = async () => {
  await supabase.auth.signOut()
  window.location.href="index.html"
}

</script>

</body>
</html>
