<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Settings</title>

<style>
body{ margin:0; background:#060606; color:white; font-family:Arial; }
#navbar{ width:100%; position:fixed; top:0; left:0; z-index:1000; }
.page-wrapper{ display:flex; margin-top:80px; }
.sidebar{ width:260px; background:#0a0a0a; padding:30px 20px; position:fixed; top:80px; left:0; height:100%; }
.sidebar a{ display:block; padding:12px; background:#111; margin-bottom:10px; border-radius:10px; color:white; text-decoration:none; }
.sidebar a:hover{ background:#222; }
.main{ margin-left:260px; padding:40px; width:100%; }
.card{ background:#111; padding:25px; border-radius:15px; margin-bottom:25px; }
input{ width:100%; padding:12px; border:none; border-radius:10px; background:#1a1a1a; color:white; margin-top:10px; }
button{ padding:12px 20px; border:none; border-radius:10px; background:#ff0055; color:white; margin-top:15px; cursor:pointer; }
.toggle{ display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #222; }
.toggle label{ opacity:.9; }
</style>
</head>

<body>

<div id="navbar"></div>

<div class="page-wrapper">

  <div class="sidebar">
    <a href="overview.html">📊 Overview</a>
    <a href="profile.html">👤 Profile</a>
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <a href="rewards.html">🎁 Rewards</a>
    <a href="collabs.html">🤝 Collabs</a>
    <a href="settings.html">⚙️ Settings</a>
  </div>

  <div class="main">

    <h1>⚙️ Account Settings</h1>

    <!-- ACCOUNT INFO -->
    <div class="card">
      <h2>Account Information</h2>
      <input placeholder="Sähköposti" value="aleksi@example.com">
      <input placeholder="Käyttäjänimi" value="Aleksi">
      <button>Päivitä tiedot</button>
    </div>

    <!-- SECURITY -->
    <div class="card">
      <h2>Security</h2>
      <input type="password" placeholder="Nykyinen salasana">
      <input type="password" placeholder="Uusi salasana">
      <input type="password" placeholder="Vahvista uusi salasana">
      <button>Vaihda salasana</button>
    </div>

    <!-- NOTIFICATIONS -->
    <div class="card">
      <h2>Notifications</h2>

      <div class="toggle">
        <label>Sähköposti-ilmoitukset</label>
        <input type="checkbox" checked>
      </div>

      <div class="toggle">
        <label>Uudet sponsoripyynnöt</label>
        <input type="checkbox" checked>
      </div>

      <div class="toggle">
        <label>Leaderboard-päivitykset</label>
        <input type="checkbox">
      </div>

      <div class="toggle">
        <label>Creator Hub -uutiset</label>
        <input type="checkbox">
      </div>

    </div>

    <!-- PRIVACY -->
    <div class="card">
      <h2>Privacy
