<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Overview</title>

<style>
body{
    margin:0;
    background:#060606;
    color:white;
    font-family:Arial;
}

/* NAVBAR */
#navbar{
    width:100%;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
}

/* PAGE WRAPPER */
.page-wrapper{
    display:flex;
    margin-top:80px;
}

/* SIDEBAR PLACEHOLDER */
#sidebar{
    width:260px;
}

/* MAIN CONTENT */
.main{
    margin-left:260px;
    padding:40px;
    width:100%;
    position:relative;
}

/* HERO GLOW BEHIND TITLE */
.main::before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:70%;
    height:200px;
    background:radial-gradient(circle at center,
      rgba(255,230,120,0.15),
      transparent 70%);
    filter:blur(25px);
    z-index:-1;
}

/* TITLE */
.main h1{
    font-size:42px;
    margin-bottom:30px;
    background:linear-gradient(45deg,#ffffff,#ffe680);
    -webkit-background-clip:text;
    color:transparent;
}

/* STAT GRID */
.stat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

/* STAT CARD */
.stat{
    background:#181818;
    padding:25px;
    border-radius:15px;
    text-align:center;
    transition:.25s;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:
        0 0 10px rgba(255,255,200,0.10),
        0 0 18px rgba(0,0,0,0.4);
}

.stat:hover{
    transform:translateY(-6px);
    box-shadow:
        0 0 14px rgba(255,255,200,0.20),
        0 0 25px rgba(255,230,120,0.15);
}

.stat h3{
    margin:0;
    opacity:.8;
    font-size:16px;
}

.stat span{
    font-size:34px;
    font-weight:bold;
    margin-top:8px;
    display:block;
    background:linear-gradient(45deg,#ffffff,#ffe680);
    -webkit-background-clip:text;
    color:transparent;
}

/* ACTIVITY CARD */
.card{
    background:#111;
    padding:30px;
    border-radius:18px;
    margin-top:35px;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:
        0 0 12px rgba(255,255,200,0.10),
        0 0 20px rgba(0,0,0,0.4);
    transition:.25s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:
        0 0 16px rgba(255,255,200,0.20),
        0 0 28px rgba(255,230,120,0.15);
}

.card h2{
    margin-top:0;
    margin-bottom:20px;
    background:linear-gradient(45deg,#ffffff,#ffe680);
    -webkit-background-clip:text;
    color:transparent;
}

.activity-item{
    padding:12px 0;
    border-bottom:1px solid #222;
    opacity:.9;
    transition:.2s;
}

.activity-item:hover{
    opacity:1;
    color:#ffe680;
}

/* PLATFORM GRID */
.platform-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-top:20px;
}

/* PLATFORM CARD */
.platform-card{
    background:#181818;
    padding:15px;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:12px;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 0 10px rgba(255,255,200,0.10);
    transition:.25s;
}

.platform-card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 14px rgba(255,255,200,0.20);
}

.platform-card img{
    width:32px;
    height:32px;
}

.platform-card label{
    flex:1;
    font-size:15px;
}

/* TOGGLE SWITCH */
.switch {
    position: relative;
    width: 46px;
    height: 24px;
    display: inline-block;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0;
    right: 0; bottom: 0;
    background-color: #333;
    transition: .3s;
    border-radius: 34px;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.4);
}

.slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
}

/* ACTIVE (CONNECTED) */
input:checked + .slider {
    background-color: #4ade80;
}

input:checked + .slider:before {
    transform: translateX(22px);
}
</style>
</head>

<body>

<div id="navbar"></div>

<div class="page-wrapper">

  <!-- SIDEBAR LOADED FROM sidebarnav.html -->
  <div id="sidebar"></div>

  <div class="main">

    <h1>📊 Overview</h1>

    <div class="stat-grid">
      <div class="stat">
        <h3>TikTok Followers</h3>
        <span>12 450</span>
      </div>
      <div class="stat">
        <h3>YouTube Subs</h3>
        <span>3 210</span>
      </div>
      <div class="stat">
        <h3>Twitch Followers</h3>
        <span>980</span>
      </div>
      <div class="stat">
        <h3>Monthly Growth</h3>
        <span>+14%</span>
      </div>
    </div>

    <div class="card">
      <h2>Recent Activity</h2>
      <div class="activity-item">🔥 Uusi TikTok-video sai 12.4k näyttökertaa</div>
      <div class="activity-item">⭐ YouTube Shorts nousi 1.2k katseluun</div>
      <div class="activity-item">🤝 Uusi sponsoripyyntö: GamingGear</div>
      <div class="activity-item">🏆 Nousit 3 sijaa leaderboardissa</div>
    </div>

    <!-- LINKED PLATFORMS -->
    <div class="card" style="margin-top:40px;">
      <h2>Linked Platforms</h2>
      <div id="platform-list-overview" class="platform-grid"></div>
    </div>

  </div>

</div>

<script>
fetch("../navbar.html")
  .then(r=>r.text())
  .then(d=>document.getElementById("navbar").innerHTML=d);
</script>

<script>
fetch("../sidebarnav.html")
  .then(r=>r.text())
  .then(d=>document.getElementById("sidebar").innerHTML=d);
</script>

<script>
const platforms = [
  { id: "twitch", name: "Twitch", icon: "assets/icons/TWITCH.png" },
  { id: "youtube", name: "YouTube", icon: "assets/icons/YOUTUBE.png" },
  { id: "tiktok", name: "TikTok", icon: "assets/icons/TIKTOK.png" },
  { id: "instagram", name: "Instagram (TBA)", icon: "assets/icons/INSTAGRAM.png" },
  { id: "facebook", name: "Facebook (TBA)", icon: "assets/icons/FACEBOOK.png" },
  { id: "twitter", name: "X (Twitter) (TBA)", icon: "assets/icons/X.png" },
  { id: "kick", name: "Kick (TBA)", icon: "assets/icons/KICK.png" },
  { id: "snapchat", name: "Snapchat (TBA)", icon: "assets/icons/SNAPCHAT.png" }
];

function renderPlatforms() {
  const container = document.getElementById("platform-list-overview");
  container.innerHTML = "";

  platforms.forEach(p => {
    const div = document.createElement("div");
    div.className = "platform-card";

    div.innerHTML = `
      <img src="${p.icon}">
      <label style="flex:1;">${p.name}</label>

      <label class="switch">
        <input type="checkbox" id="${p.id}">
        <span class="slider"></span>
      </label>
    `;

    container.appendChild(div);
  });
}

renderPlatforms();
</script>

<!-- SUPABASE LOGIC -->
<script type="module">

import { supabase } from "./js/supabase.js"

window.onload = async () => {
  const { data } = await supabase.auth.getUser()
  if(!data.user){ window.location.href="index.html"; return }
}

window.logoutUser = async () => {
  await supabase.auth.signOut()
  window.location.href="index.html"
}

</script>

</body>
</html>
