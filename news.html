<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>News</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
color:white;

/* Same background as index */
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/*  Layout fix for navbar */
main{
padding-top:120px;
}

/* News title */

.news-title{
text-align:center;
font-size:50px;
background:linear-gradient(45deg,#ff0055,#7000ff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:60px;
}

/* Grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

/* Card */

.card{
background:#111;
border-radius:20px;
overflow:hidden;
padding-bottom:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
padding:20px 20px 10px 20px;
margin:0;
}

.card p{
padding:0 20px;
opacity:.8;
}

/* Footer spacing */

footer{
margin-top:120px;
}

</style>

</head>

<body>

<!-- ⭐ NAVBAR LOAD -->
<div id="navbar"></div>

<main>

<section>

<h2 class="news-title">News</h2>

<div class="grid">

<a href="news-post1.html" style="text-decoration:none;color:white;">
<div class="card">
<img src="https://images.unsplash.com/photo-1522199755839-a2bacb67c546">
<h3>Launch Campaign</h3>
<p>Liity mukaan ensimmäisten joukossa</p>
</div>
</a>

<div class="card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<h3>TBA</h3>
<p>TBA</p>
</div>

</div>

</section>

</main>

<!--  FOOTER LOAD -->
<div id="footer"></div>

<script>

/* Load Navbar */
fetch("navbar.html")
.then(r => r.text())
.then(data=>{
document.getElementById("navbar").innerHTML=data;
});

/* Load Footer */
fetch("footer.html")
.then(r => r.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});

</script>

</body>
</html>
